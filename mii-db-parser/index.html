<h3 style="margin: 5px 0">simple display for mii databases</h3>
<div>
  supported: RFL_DB.dat (Wii, no Parade),
  CFL_DB.dat (3DS), Wii Remote (752-byte "RNCD"),
  FFL_ODB.dat (Wii U), MiiDatabase.dat (Switch)
</div>
<input type="file" id="fileInput" accept=".dat" />
<h2>Mii Data List:</h2>
<ul id="dataList">
    <!-- Mii images with Base64 strings will be appended here -->
</ul>

<script type="module">
// @ts-check

window.addEventListener('load', () =>
  decompressFile(base64ToUint8Array(FFL_ODB_GZ_B64)).then((fileBuffer) => {
    spoofFileUpload(fileBuffer, 'FFL_ODB preset from chayton.dat');
  })
);

/** Decodes a Base64 string into a Uint8Array. */
function base64ToUint8Array(/** @type {string} */ base64) {
  const binary = atob(base64);
  const output = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    output[i] = binary.charCodeAt(i);
  }
  return output;
}

/** Decompresses the data directly into a pre-allocated output buffer. */
const decompressFile = async (/** @type {Uint8Array<ArrayBuffer>} */
  compressedBytes, /** @type {CompressionFormat} */ format = 'gzip') =>
  new Uint8Array(
    await new Response(new Response(compressedBytes).body
      .pipeThrough(new DecompressionStream(format))).arrayBuffer()
  );

/**
 * Creates a synthetic File object from the embedded database
 * and injects it into the file input element.
 */
function spoofFileUpload(/** @type {Uint8Array<ArrayBuffer>} */ data,
  /** @type {string} */ fname = 'file.dat') {
  const fakeFile = new File(
    [data], fname, {
      type: 'application/octet-stream',
      lastModified: Date.now()
    });

  const dataTransfer = new DataTransfer();
  dataTransfer.items.add(fakeFile);

  const fileInput = document.getElementById('fileInput');

  fileInput.files = dataTransfer.files;
  // Trigger the normal upload handler.
  fileInput.dispatchEvent(new Event('change'));
}
