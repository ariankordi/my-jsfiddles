<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fading Video and Image</title>
  <style>
    #videoContainer {
      position: relative;
      width: 640px;
      height: 360px;
      overflow: hidden;
    }

    video, img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      float: right;
      margin-top: 20px;
      margin-left: 20px;
      width: 100px;
      height: 100px;
      border-radius: 70px;
      transition: opacity 1s ease-in-out;
    }

    img {
      float: right;
      margin-top: 20px;
      margin-left: 20px;
      width: 100px;
      height: 100px;
    }
  </style>
</head>
<body>
  <div id="videoContainer">
    <video id="myVideo" src="https://video.twimg.com/ext_tw_video/1637714333579767808/pu/vid/730x720/ZowVHOvvPOTyLSm-.mp4?tag=12"></video>
    <img src="https://raw.githubusercontent.com/PF2M/Indigo/dev/assets/img/restricted.png" alt="Sample Image">
  </div>

  <script src="script.js"></script>
<script src="script.js"></script>
</body>
</html>
