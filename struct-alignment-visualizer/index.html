<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            font-family: monospace;
            font-size: 14px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
        }
        .struct-container {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            width: 300px;
        }
        .member {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }
        .padding {
            background-color: #fdd;
            color: #900;
        }
        .member:last-child {
            border-bottom: none;
        }
        .struct-header {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h1>C Struct Alignment Visualizer</h1>
<textarea id="structInput" placeholder="Enter your C struct here...">
typedef struct {
    char a;
    int b;
    short c;
    double d;
} MyStruct;
</textarea>
<br>
<button onclick="visualizeStruct()">Visualize Struct</button>

<div id="visualization" class="struct-container"></div>


<script src="script.js"></script>
</body>
</html>
